<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculus Fruit Visualizer</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
            user-select: none;
            transition: background-color 0.3s ease;
        }
        
        body.light-mode {
            background-color: #ffffff;
            color: #333333;
        }

        #control-panel {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background: #1e1e1e;
            border-right: 2px solid #333333;
            padding: 20px;
            width: 380px;
            min-width: 320px;
            max-width: 600px;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.2);
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            resize: horizontal;
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        body.light-mode #control-panel {
            background: #f8f9fa;
            border-right: 2px solid #dcdee0;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.03);
        }

        .scrollable-content {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
            margin-top: 10px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            transition: color 0.3s;
        }
        body.light-mode h2 { color: #111111; }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5a67d8;
            margin: 15px 0 5px 0;
            font-weight: 700;
        }
        body.light-mode .section-title { color: #4752c4; }

        #math-panel {
            background: #151515;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            transition: background 0.3s, border-color 0.3s;
        }
        body.light-mode #math-panel {
            background: #f1f3f5;
            border-color: #dcdee0;
        }

        .view-controls {
            background: #252525;
            border: 1px solid #3d3d3d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s;
        }
        body.light-mode .view-controls {
            background: #ffffff;
            border-color: #e4e6e8;
        }

        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-weight: 500;
            color: #cccccc;
            transition: color 0.3s;
        }
        body.light-mode label { color: #444444; }

        select {
            width: 125px;
            background: #333333;
            border: 1px solid #555555;
            color: #ffffff;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        body.light-mode select {
            background: #ffffff;
            border-color: #c1c4c8;
            color: #111111;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        th {
            text-align: left;
            padding-bottom: 6px;
            color: #888888;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.68rem;
            border-bottom: 1px solid #3d3d3d;
        }
        body.light-mode th { border-bottom-color: #e4e6e8; }

        td {
            padding: 4px 0;
            border-bottom: 1px solid #252525;
        }
        body.light-mode td { border-bottom-color: #f1f3f5; }

        .point-label { font-weight: 600; font-family: monospace; }

        input[type="number"] {
            width: 55px;
            background: #333333;
            border: 1px solid #555555;
            color: #ffffff;
            padding: 4px;
            border-radius: 4px;
            font-family: monospace;
            text-align: center;
        }
        body.light-mode input[type="number"] { background: #ffffff; border-color: #c1c4c8; color: #111111; }

        input[type="range"] { width: 125px; accent-color: #5a67d8; }
        body.light-mode input[type="range"] { accent-color: #4752c4; }

        #play-button {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: #5a67d8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(90, 103, 216, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: background 0.2s;
        }
        body.light-mode #play-button { background: #4752c4; }
        #play-button.playing-state { background: #e53e3e; }

        #mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2d2d2d;
            border: 1px solid #444444;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f3f5;
        }
        body.light-mode #mode-toggle { background: #f1f3f5; border-color: #dcdee0; color: #333333; }
        #mode-toggle svg { width: 18px; height: 18px; fill: currentColor; }
        body.light-mode #mode-toggle .moon-icon { display: block; }
        body.light-mode #mode-toggle .sun-icon { display: none; }
        #mode-toggle .moon-icon { display: none; }
    </style>
</head>
<body>

    <button id="mode-toggle" onclick="toggleTheme()">
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3zm0-10c.6 0 1-.4 1-1V3c0-.6-.4-1-1-1s-1 .4-1 1v1c0 .6.4 1 1 1zm0 14c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1s1-.4 1-1v-1c0-.6-.4-1-1-1zM5 12c0-.6-.4-1-1-1H3c-.6 0-1 .4-1 1s.4 1 1 1h1c.6 0 1-.4 1-1zm12.2-5.8c.4.4 1 .4 1.4 0l.7-.7c.4-.4.4-1 0-1.4s-1-.4-1.4 0l-.7.7c-.4.4-.4 1 0 1.4z"/></svg>
    </button>

    <div id="control-panel">
        <h2>Fruit Visualizer</h2>
        
        <div id="math-panel">
            <div id="latex-formula">$$V = \pi \int_{a}^{b} [r(x)]^2 dx$$</div>
            <div id="calculated-volume" style="font-weight: bold; margin-top: 5px; color: #5a67d8;">Calculated Volume: --</div>
        </div>

        <div class="scrollable-content">
            <div class="section-title">Model Profiles</div>
            <div class="view-controls">
                <div class="control-group">
                    <label>Target Preset</label>
                    <select id="preset-select" onchange="loadTargetPreset()">
                        <option value="orange" selected>Orange</option>
                        <option value="kiwi">Kiwi</option>
                        <option value="potato">Potato</option>
                        <option value="carrot">Carrot</option>
                        <option value="apple">Apple</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Active Input Points</label>
                    <select id="points-count-select" onchange="handlePointsCountChange()"></select>
                </div>
            </div>

            <div class="section-title">Riemann & Render Settings</div>
            <div class="view-controls">
                <div class="control-group">
                    <label>Approximation Mode</label>
                    <select id="render-mode" onchange="updateVisualization()">
                        <option value="smooth" selected>Smooth</option>
                        <option value="disks">Discrete</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Disk Subdivisions (n)</label>
                    <input type="range" id="disk-count" min="3" max="100" step="1" value="11" oninput="updateVisualization()">
                </div>
                <div class="control-group">
                    <label>Animation Speed</label>
                    <input type="range" id="speed-slider" min="0.002" max="0.03" step="0.002" value="0.008">
                </div>
                <div class="control-group">
                    <label>Peel Opacity</label>
                    <input type="range" id="opacity-slider" min="0.05" max="1.0" step="0.05" value="0.7" oninput="updateVisualization()">
                </div>
                <div class="control-group">
                    <label>Coordinate Grid</label>
                    <input type="checkbox" id="grid-toggle" checked onchange="updateVisualization()">
                </div>
            </div>

            <div class="section-title">Profile Coordinates</div>
            <table>
                <thead>
                    <tr>
                        <th>Node</th>
                        <th>Position (X)</th>
                        <th>Radius r(x)</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <button id="play-button" onclick="handleActionButtonClick()">
        <svg id="button-icon" viewBox="0 0 24 24" width="16"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
        <span id="button-text">Play Animation</span>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scaleFactor = 4;
        let isAnimatingVolume = false, animationProgress = 0.0, hasAnimated = false;

        const coreColors = { orange: '#fce3b6', kiwi: '#d5e6a1', potato: '#ebdca2', carrot: '#ff9d42', apple: '#fbfade' };

        const presets = {
            orange: {
                data: [{x:9,r:0},{x:9,r:1.65},{x:8,r:3.35},{x:7,r:4.1},{x:6,r:4.55},{x:5,r:4.75},{x:4,r:4.8},{x:3,r:4.6},{x:2,r:4.05},{x:1,r:2.85},{x:0,r:0}],
                roughness: 0.5, clearcoat: 0.4, bumpScale: 0.007, stemColor: 0x3d5229, stemVisible: true,
                draw: (m, b) => { m.fillStyle = '#ff7605'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); }
            },
            kiwi: {
                data: [{x:8.5,r:0},{x:8,r:2.1},{x:7,r:3.1},{x:6,r:3.5},{x:5,r:3.6},{x:4,r:3.6},{x:3,r:3.5},{x:2,r:3.2},{x:1,r:2.3},{x:0.5,r:0}],
                roughness: 0.9, clearcoat: 0.0, bumpScale: 0.015, stemColor: 0x221a12, stemVisible: false,
                draw: (m, b) => { m.fillStyle = '#705133'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); }
            },
            potato: {
                data: [{x:10,r:0},{x:9,r:1.8},{x:7.5,r:2.7},{x:6,r:3.0},{x:4.5,r:2.9},{x:3,r:2.8},{x:1.5,r:2.2},{x:0,r:0}],
                roughness: 0.85, clearcoat: 0.0, bumpScale: 0.012, stemColor: 0x1a120b, stemVisible: false,
                draw: (m, b) => { m.fillStyle = '#b38f5c'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); }
            },
            carrot: {
                data: [{x:11,r:0},{x:10,r:1.2},{x:8.5,r:1.4},{x:7,r:1.5},{x:5,r:1.3},{x:3,r:1.0},{x:1,r:0.6},{x:0,r:0}],
                roughness: 0.6, clearcoat: 0.15, bumpScale: 0.01, stemColor: 0x517332, stemVisible: true,
                draw: (m, b) => { m.fillStyle = '#ff6b00'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); }
            },
            apple: {
                data: [{x:7.5,r:0},{x:7,r:2.4},{x:6,r:3.8},{x:4.5,r:4.1},{x:3,r:4.0},{x:1.5,r:3.4},{x:0.5,r:2.0},{x:0,r:0}],
                roughness: 0.22, clearcoat: 0.8, bumpScale: 0.003, stemColor: 0x2b1e11, stemVisible: true,
                draw: (m, b) => { m.fillStyle = '#cc1818'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); }
            }
        };

        let activePresetPointsData = [], runtimePoints = [], visualMarkers = [];
        const desmosColors = [0xc74440, 0x2d70b3, 0x388c46, 0x6042a6, 0xfa7e19, 0x00a3a3];
        const markerGeo = new THREE.SphereGeometry(0.025, 16, 16);

        const mapCanvas = document.createElement('canvas'), bumpCanvas = document.createElement('canvas');
        mapCanvas.width = bumpCanvas.width = 512; mapCanvas.height = bumpCanvas.height = 512;
        const mCtx = mapCanvas.getContext('2d'), bCtx = bumpCanvas.getContext('2d');
        const textureColor = new THREE.CanvasTexture(mapCanvas), textureBump = new THREE.CanvasTexture(bumpCanvas);

        const fruitMaterial = new THREE.MeshPhysicalMaterial({
            map: textureColor, bumpMap: textureBump, metalness: 0.0, reflectivity: 0.5,
            transparent: true, opacity: 0.7, side: THREE.DoubleSide, depthWrite: true
        });

        const interiorMaterial = new THREE.MeshStandardMaterial({ roughness: 0.8, side: THREE.DoubleSide });

        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x121212);
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(1.5, 1.5, 4.0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let measurementGrid = new THREE.GridHelper(8, 32, 0x444444, 0x222222);
        measurementGrid.position.y = -1.2; scene.add(measurementGrid);

        const axisLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-3,0,0), new THREE.Vector3(3,0,0)]), new THREE.LineDashedMaterial({ color: 0x5a67d8, dashSize: 0.08, gapSize: 0.05 }));
        axisLine.computeLineDistances(); scene.add(axisLine);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.4); keyLight.position.set(5, 8, 5); scene.add(keyLight);

        let fruitMesh = new THREE.Mesh(new THREE.BufferGeometry(), fruitMaterial); scene.add(fruitMesh);
        let diskGroup = new THREE.Group(); scene.add(diskGroup);
        const overlayGroup = new THREE.Group(); scene.add(overlayGroup);

        const stemGroup = new THREE.Group();
        const stemMat = new THREE.MeshStandardMaterial({ roughness: 0.9 });
        const stemBase = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.008, 0.04, 12), stemMat);
        const stemStick = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.12, 8), stemMat);
        stemStick.position.z = 0.05; stemStick.rotation.x = Math.PI / 2;
        stemGroup.add(stemBase, stemStick); scene.add(stemGroup);

        // --- Sextic Regression Engine Math ---
        function getSexticCoefficients(pts) {
            const degree = 6;
            const order = degree + 1;
            const n = pts.length;

            let X = Array(order).fill(0).map(() => Array(order).fill(0));
            let Y = Array(order).fill(0);

            for (let i = 0; i < n; i++) {
                const x = pts[i].x;
                const r = pts[i].r;
                for (let row = 0; row < order; row++) {
                    for (let col = 0; col < order; col++) {
                        X[row][col] += Math.pow(x, row + col);
                    }
                    Y[row] += r * Math.pow(x, row);
                }
            }

            for (let i = 0; i < order; i++) {
                let maxEl = Math.abs(X[i][i]), maxRow = i;
                for (let k = i + 1; k < order; k++) {
                    if (Math.abs(X[k][i]) > maxEl) {
                        maxEl = Math.abs(X[k][i]);
                        maxRow = k;
                    }
                }
                for (let k = i; k < order; k++) {
                    let tmp = X[maxRow][k]; X[maxRow][k] = X[i][k]; X[i][k] = tmp;
                }
                let tmp = Y[maxRow]; Y[maxRow] = Y[i]; Y[i] = tmp;

                if (Math.abs(X[i][i]) < 1e-9) continue; 

                for (let k = i + 1; k < order; k++) {
                    let c = -X[k][i] / X[i][i];
                    for (let j = i; j < order; j++) {
                        if (i === j) X[k][j] = 0;
                        else X[k][j] += c * X[i][j];
                    }
                    Y[k] += c * Y[i];
                }
            }

            let coef = Array(order).fill(0);
            for (let i = order - 1; i >= 0; i--) {
                if (Math.abs(X[i][i]) < 1e-9) { coef[i] = 0; continue; }
                coef[i] = Y[i] / X[i][i];
                for (let k = i - 1; k >= 0; k--) {
                    Y[k] -= X[k][i] * coef[i];
                }
            }
            return coef;
        }

        function evaluateSextic(coef, x) {
            let val = 0;
            for (let i = 0; i < coef.length; i++) {
                val += coef[i] * Math.pow(x, i);
            }
            return Math.max(0, val);
        }

        function loadTargetPreset() {
            isAnimatingVolume = false; hasAnimated = false;
            setPlayUI();

            const currentKey = document.getElementById('preset-select').value;
            const target = presets[currentKey];

            interiorMaterial.color.set(coreColors[currentKey] || '#eedcb3');

            mCtx.globalAlpha = 1.0; bCtx.globalAlpha = 1.0;
            target.draw(mCtx, bCtx);
            textureColor.needsUpdate = true; textureBump.needsUpdate = true;

            fruitMaterial.roughness = target.roughness;
            fruitMaterial.clearcoat = target.clearcoat;
            fruitMaterial.bumpScale = target.bumpScale;
            stemMat.color.setHex(target.stemColor);
            stemGroup.visible = target.stemVisible;

            activePresetPointsData = target.data.map(d => ({ x: d.x, r: d.r }));

            const countSelect = document.getElementById('points-count-select');
            countSelect.innerHTML = '';
            for (let k = 3; k <= activePresetPointsData.length; k++) {
                const opt = document.createElement('option');
                opt.value = k; opt.innerText = k;
                if (k === activePresetPointsData.length) opt.selected = true;
                countSelect.appendChild(opt);
            }

            document.getElementById('disk-count').value = activePresetPointsData.length;

            buildControlTableAndMeshes(activePresetPointsData.length);
        }

        function handlePointsCountChange() {
            const count = parseInt(document.getElementById('points-count-select').value);
            document.getElementById('disk-count').value = count;
            buildControlTableAndMeshes(count);
        }

        function buildControlTableAndMeshes(numPointsToUse) {
            if (activePresetPointsData.length > numPointsToUse) {
                activePresetPointsData = activePresetPointsData.slice(0, numPointsToUse);
            } else if (activePresetPointsData.length < numPointsToUse) {
                const last = activePresetPointsData[activePresetPointsData.length - 1] || { x: 0, r: 0 };
                while (activePresetPointsData.length < numPointsToUse) activePresetPointsData.push({ x: last.x, r: last.r });
            }

            runtimePoints = [];
            while(overlayGroup.children.length > 0) {
                overlayGroup.children[0].geometry.dispose();
                overlayGroup.remove(overlayGroup.children[0]);
            }
            visualMarkers = [];

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            activePresetPointsData.forEach((data, i) => {
                runtimePoints.push({ x: data.x / scaleFactor, r: data.r / scaleFactor });
                const colorHex = desmosColors[i % desmosColors.length];
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="point-label" style="color: #${colorHex.toString(16).padStart(6, '0')}">P<sub>${i}</sub></td>
                    <td><input type="number" id="x-${i}" value="${data.x}" step="0.5" oninput="updateDataFields(${i})"></td>
                    <td><input type="number" id="r-${i}" value="${data.r}" step="0.05" oninput="updateDataFields(${i})"></td>
                `;
                tbody.appendChild(tr);

                const markerMesh = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: colorHex }));
                overlayGroup.add(markerMesh); visualMarkers.push(markerMesh);
            });

            animationProgress = 0.0;
            updateGeometry(0.001);
            updateVisualization();
        }

        function updateDataFields(index) {
            const xVal = parseFloat(document.getElementById(`x-${index}`).value) || 0;
            const rVal = parseFloat(document.getElementById(`r-${index}`).value) || 0;
            activePresetPointsData[index].x = xVal; activePresetPointsData[index].r = rVal;
            runtimePoints[index].x = xVal / scaleFactor; runtimePoints[index].r = rVal / scaleFactor;
            
            updateGeometry(hasAnimated ? animationProgress * Math.PI * 2 : 0.001);
        }

        function calculateMathematicalVolume() {
            if(runtimePoints.length < 2) return;
            
            const renderMode = document.getElementById('render-mode').value;
            let computedVolume = 0;

            const a = activePresetPointsData[activePresetPointsData.length - 1].x;
            const b = activePresetPointsData[0].x;
            const n = parseInt(document.getElementById('disk-count').value);

            if (renderMode === 'disks') {
                if (n === runtimePoints.length) {
                    for (let i = runtimePoints.length - 1; i > 0; i--) {
                        const xLeft = runtimePoints[i].x * scaleFactor;
                        const xRight = runtimePoints[i-1].x * scaleFactor;
                        const dx = Math.abs(xRight - xLeft);
                        
                        const rLeft = runtimePoints[i].r * scaleFactor;
                        const rRight = runtimePoints[i-1].r * scaleFactor;
                        const radiusMid = (rLeft + rRight) / 2;

                        computedVolume += Math.PI * Math.pow(radiusMid, 2) * dx;
                    }
                } else {
                    const coef = getSexticCoefficients(runtimePoints);
                    const startX = runtimePoints[runtimePoints.length - 1].x;
                    const endX = runtimePoints[0].x;
                    const dx = (endX - startX) / n;

                    for (let i = 0; i < n; i++) {
                        const xLeft = startX + i * dx;
                        const xMid = xLeft + dx / 2;
                        const radius = evaluateSextic(coef, xMid) * scaleFactor;
                        computedVolume += Math.PI * Math.pow(radius, 2) * (dx * scaleFactor);
                    }
                }
                document.getElementById('calculated-volume').innerText = `Calculated Volume (Discrete): ${Math.abs(computedVolume).toFixed(3)} cm³`;
            } else {
                const samples = 200;
                const lathePoints = runtimePoints.map(p => new THREE.Vector2(p.r * scaleFactor, p.x * scaleFactor));
                const curve = new THREE.SplineCurve(lathePoints);
                const totalWidth = b - a;
                const dx = totalWidth / samples;

                for(let i = 0; i <= samples; i++) {
                    const evalX = a + i * dx;
                    const t = (evalX - a) / (totalWidth || 1);
                    const radiusAtX = curve.getPointAt(1 - t).x;
                    const factor = (i === 0 || i === samples) ? 1 : (i % 2 === 0 ? 2 : 4);
                    computedVolume += (factor * Math.PI * Math.pow(radiusAtX, 2) * dx) / 3;
                }
                document.getElementById('calculated-volume').innerText = `Calculated Volume (Smooth): ${Math.abs(computedVolume).toFixed(3)} cm³`;
            }

            // FIX: Double-escaped backslashes so JavaScript outputs them cleanly for MathJax parsing
            const latexContainer = document.getElementById('latex-formula');
            latexContainer.innerHTML = `$$V \\approx \\sum_{i=1}^{n} \\pi \\cdot \\left[ r\\left(\\frac{x_{i-1} + x_i}{2}\\right) \\right]^2 \\Delta x$$`;
            if (window.MathJax) MathJax.typesetPromise([latexContainer]);
        }

        function updateGeometry(phiLength = Math.PI * 2) {
            const count = runtimePoints.length;
            if (count === 0) return;

            for(let i=0; i<count; i++) {
                if(visualMarkers[i]) visualMarkers[i].position.set(runtimePoints[i].x, runtimePoints[i].r, 0);
            }

            fruitMesh.geometry.dispose();
            while(diskGroup.children.length > 0) {
                diskGroup.children[0].geometry.dispose();
                diskGroup.remove(diskGroup.children[0]);
            }

            const renderMode = document.getElementById('render-mode').value;
            const n = parseInt(document.getElementById('disk-count').value);

            const lathePoints = runtimePoints.map(p => new THREE.Vector2(p.r, p.x));
            const curve = new THREE.SplineCurve(lathePoints);
            const smoothProfilePoints = curve.getPoints(128);

            const diskSliderRow = document.getElementById('disk-count').closest('.control-group');
            
            if (renderMode === 'smooth') {
                diskSliderRow.style.opacity = '0.4';
                diskSliderRow.style.pointerEvents = 'none';
                
                fruitMesh.visible = true;
                const safePhi = Math.max(0.001, phiLength);
                const geo = new THREE.LatheGeometry(smoothProfilePoints, 128, 0, safePhi);
                geo.rotateZ(-Math.PI / 2);
                fruitMesh.geometry = geo;

                if (phiLength < Math.PI * 2 && phiLength > 0.05) {
                    const capGeo = new THREE.LatheGeometry(smoothProfilePoints, 2, 0, 0.001);
                    capGeo.rotateZ(-Math.PI / 2);
                    const capMesh1 = new THREE.Mesh(capGeo, interiorMaterial);
                    const capMesh2 = new THREE.Mesh(capGeo, interiorMaterial);
                    capMesh2.rotation.x = phiLength;
                    diskGroup.add(capMesh1, capMesh2);
                }
            } else {
                diskSliderRow.style.opacity = '1';
                diskSliderRow.style.pointerEvents = 'auto';
                fruitMesh.visible = false;
                
                if (n === count) {
                    for (let i = count - 1; i > 0; i--) {
                        const ptLeft = runtimePoints[i];
                        const ptRight = runtimePoints[i-1];
                        const dx = ptRight.x - ptLeft.x;
                        
                        const radiusMid = (ptLeft.r + ptRight.r) / 2;
                        const segmentMidX = ptLeft.x + dx / 2;

                        if (radiusMid > 0.005 && Math.abs(dx) > 0.001) {
                            const cylGeo = new THREE.CylinderGeometry(radiusMid, radiusMid, Math.abs(dx), 64, 1, false, 0, phiLength);
                            cylGeo.rotateZ(Math.PI / 2);
                            
                            const cylMesh = new THREE.Mesh(cylGeo, [fruitMaterial, interiorMaterial, interiorMaterial]);
                            cylMesh.position.x = segmentMidX;
                            diskGroup.add(cylMesh);
                        }
                    }
                } else {
                    const coef = getSexticCoefficients(runtimePoints);
                    const startX = runtimePoints[count - 1].x;
                    const endX = runtimePoints[0].x;
                    const totalLength = endX - startX;
                    const dx = totalLength / n;

                    for (let i = 0; i < n; i++) {
                        const xLeft = startX + i * dx;
                        const segmentMidX = xLeft + dx / 2;
                        const radiusMid = evaluateSextic(coef, segmentMidX);

                        if (radiusMid > 0.005 && Math.abs(dx) > 0.001) {
                            const cylGeo = new THREE.CylinderGeometry(radiusMid, radiusMid, Math.abs(dx), 64, 1, false, 0, phiLength);
                            cylGeo.rotateZ(Math.PI / 2);
                            
                            const cylMesh = new THREE.Mesh(cylGeo, [fruitMaterial, interiorMaterial, interiorMaterial]);
                            cylMesh.position.x = segmentMidX;
                            diskGroup.add(cylMesh);
                        }
                    }
                }
            }

            if(runtimePoints[0]) {
                stemGroup.position.set(runtimePoints[0].x, 0, 0);
                stemGroup.rotation.set(0, 0, -Math.PI / 2);
            }

            calculateMathematicalVolume();
        }

        UX = {
            updateVisualization: function() {
                const opacityVal = parseFloat(document.getElementById('opacity-slider').value);
                const showGrid = document.getElementById('grid-toggle').checked;
                fruitMaterial.opacity = opacityVal;
                measurementGrid.visible = showGrid;
                axisLine.visible = showGrid;
                updateGeometry(hasAnimated ? animationProgress * Math.PI * 2 : 0.001);
            }
        };
        function updateVisualization() { UX.updateVisualization(); }

        function handleActionButtonClick() {
            if (isAnimatingVolume) {
                isAnimatingVolume = false;
                setPlayUI();
            } else {
                if (animationProgress >= 1.0 || animationProgress <= 0.0) {
                    animationProgress = 0.001;
                }
                isAnimatingVolume = true;
                hasAnimated = true;
                setPauseUI();
            }
        }

        function setPlayUI() {
            const playBtn = document.getElementById('play-button');
            playBtn.classList.remove('playing-state');
            document.getElementById('button-text').innerText = "Play Animation";
            document.getElementById('button-icon').innerHTML = '<path fill="currentColor" d="M8 5v14l11-7z"/>';
        }

        function setPauseUI() {
            const playBtn = document.getElementById('play-button');
            playBtn.classList.add('playing-state');
            document.getElementById('button-text').innerText = "Pause Animation";
            document.getElementById('button-icon').innerHTML = '<path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            scene.background.setHex(isLight ? 0xffffff : 0x121212);
            
            scene.remove(measurementGrid);
            measurementGrid = new THREE.GridHelper(8, 32, isLight ? 0x111111 : 0x444444, isLight ? 0xcccccc : 0x222222);
            measurementGrid.position.y = -1.2; measurementGrid.visible = document.getElementById('grid-toggle').checked;
            scene.add(measurementGrid);

            axisLine.material.color.setHex(isLight ? 0x111111 : 0x5a67d8);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadTargetPreset();

        function animate() {
            requestAnimationFrame(animate);
            if (isAnimatingVolume) {
                const speed = parseFloat(document.getElementById('speed-slider').value);
                animationProgress += speed;
                if (animationProgress >= 1.0) { 
                    animationProgress = 1.0; 
                    isAnimatingVolume = false; 
                    setPlayUI();
                }
                updateGeometry(animationProgress * Math.PI * 2);
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
