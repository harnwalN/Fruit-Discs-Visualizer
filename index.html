<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212; /* Default to Dark Mode */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
            user-select: none;
            transition: background-color 0.3s ease;
        }
        
        /* Light Mode Override Styles */
        body.light-mode {
            background-color: #ffffff;
            color: #333333;
        }

        #control-panel {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background: #1e1e1e; /* Default Dark Mode */
            border-right: 2px solid #333333;
            padding: 24px;
            width: 340px;
            min-width: 280px;
            max-width: 600px;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.2);
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            resize: horizontal;
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        body.light-mode #control-panel {
            background: #f8f9fa;
            border-right: 2px solid #dcdee0;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.03);
        }

        .scrollable-content {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
            margin-top: 15px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #ffffff; /* Default Dark Mode */
            transition: color 0.3s;
        }
        body.light-mode h2 { color: #111111; }

        p {
            font-size: 0.85rem;
            color: #aaaaaa; /* Default Dark Mode */
            line-height: 1.5;
            margin-bottom: 12px;
            transition: color 0.3s;
        }
        body.light-mode p { color: #666666; }

        .nav-instructions {
            font-size: 0.78rem;
            background: #2d2d2d; /* Default Dark Mode */
            border-left: 3px solid #5a67d8;
            padding: 8px 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            color: #e2e8f0;
            transition: background 0.3s, color 0.3s;
        }
        body.light-mode .nav-instructions {
            background: #edf2f7;
            color: #2d3748;
            border-left-color: #4752c4;
        }

        .view-controls {
            background: #252525; /* Default Dark Mode */
            border: 1px solid #3d3d3d;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s;
        }
        body.light-mode .view-controls {
            background: #ffffff;
            border-color: #e4e6e8;
        }

        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-weight: 500;
            color: #cccccc; /* Default Dark Mode */
            transition: color 0.3s;
        }
        body.light-mode label { color: #444444; }

        select {
            width: 115px;
            background: #333333; /* Default Dark Mode */
            border: 1px solid #555555;
            color: #ffffff;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        body.light-mode select {
            background: #ffffff;
            border-color: #c1c4c8;
            color: #111111;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding-bottom: 8px;
            color: #888888;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #3d3d3d; /* Default Dark Mode */
            transition: border-color 0.3s;
        }
        body.light-mode th { border-bottom-color: #e4e6e8; }

        td {
            padding: 6px 0;
            border-bottom: 1px solid #252525; /* Default Dark Mode */
            transition: border-color 0.3s;
        }
        body.light-mode td { border-bottom-color: #f1f3f5; }

        .point-label {
            font-weight: 600;
            font-family: monospace;
        }

        input[type="number"] {
            width: 55px;
            background: #333333; /* Default Dark Mode */
            border: 1px solid #555555;
            color: #ffffff;
            padding: 5px;
            border-radius: 4px;
            font-family: monospace;
            text-align: center;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        body.light-mode input[type="number"] {
            background: #ffffff;
            border-color: #c1c4c8;
            color: #111111;
        }

        input[type="number"]:focus {
            border-color: #5a67d8; /* Default Dark Mode */
            outline: none;
        }
        body.light-mode input[type="number"]:focus { border-color: #4752c4; }

        input[type="range"] {
            width: 110px;
            accent-color: #5a67d8; /* Default Dark Mode */
        }
        body.light-mode input[type="range"] { accent-color: #4752c4; }

        input[type="checkbox"] {
            accent-color: #5a67d8; /* Default Dark Mode */
            width: 16px;
            height: 16px;
        }
        body.light-mode input[type="checkbox"] { accent-color: #4752c4; }

        #play-button {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #5a67d8; /* Default Dark Mode */
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(90, 103, 216, 0.3);
            transition: all 0.2s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        body.light-mode #play-button { background: #4752c4; box-shadow: 0 4px 15px rgba(71, 82, 196, 0.4); }
        #play-button:hover { background: #4c51bf; transform: translateY(-2px); }
        body.light-mode #play-button:hover { background: #3b45ab; }

        #play-button.reset-state {
            background: #555555;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        body.light-mode #play-button.reset-state {
            background: #718096;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }
        #play-button.reset-state:hover { background: #444444; }
        body.light-mode #play-button.reset-state:hover { background: #4a5568; }

        #play-button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Mode Toggle Button Style */
        #mode-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2d2d2d; /* Default Dark Mode */
            border: 1px solid #444444;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f3f5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.2s;
        }
        #mode-toggle:hover { transform: scale(1.05); }
        body.light-mode #mode-toggle {
            background: #f1f3f5;
            border-color: #dcdee0;
            color: #333333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        #mode-toggle svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        #mode-toggle .moon-icon { display: none; } /* Default is dark, show sun icon */
        #mode-toggle .sun-icon { display: block; }
        body.light-mode #mode-toggle .moon-icon { display: block; }
        body.light-mode #mode-toggle .sun-icon { display: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 10px; }
        body.light-mode ::-webkit-scrollbar-thumb { background: #ced4da; }
    </style>
</head>
<body>

    <button id="mode-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg class="moon-icon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="sun-icon" viewBox="0 0 24 24">
            <path d="M12 7c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3zm0-10c.6 0 1-.4 1-1V3c0-.6-.4-1-1-1s-1 .4-1 1v1c0 .6.4 1 1 1zm0 14c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1s1-.4 1-1v-1c0-.6-.4-1-1-1zm8.5-7.5h-1c-.6 0-1 .4-1 1s.4 1 1 1h1c.6 0 1-.4 1-1s-.4-1-1-1zM5 12c0-.6-.4-1-1-1H3c-.6 0-1 .4-1 1s.4 1 1 1h1c.6 0 1-.4 1-1zm12.2-5.8c.4.4 1 .4 1.4 0l.7-.7c.4-.4.4-1 0-1.4s-1-.4-1.4 0l-.7.7c-.4.4-.4 1 0 1.4zm-10.6 10.6c.4.4 1 .4 1.4 0s.4-1 0-1.4l-.7-.7c-.4-.4-1-.4-1.4 0s-.4 1 0 1.4l.7.7zm11.3-.7c-.4-.4-1-.4-1.4 0s-.4 1 0 1.4l.7.7c.4.4 1 .4 1.4 0s.4-1 0-1.4l-.7-.7zm-10.6-12c-.4-.4-1-.4-1.4 0s-.4 1 0 1.4l.7.7c.4.4 1 .4 1.4 0s.4-1 0-1.4l-.7-.7z"/>
        </svg>
    </button>

    <div id="control-panel">
        <h2>Fruit Visualizer</h2>
        <p>Revolving <i>r(x)</i> around the <i>X</i>-axis via Disk Method:<br> <b>V = &pi; &int;<sub>a</sub><sup>b</sup> [r(x)]<sup>2</sup> dx</b></p>
        
        <div class="nav-instructions">
            <b>Navigation Controls:</b><br>
            • <b>Left-Click + Drag:</b> Orbit camera viewpoint<br>
            • <b>Scroll Wheel:</b> Zoom view in / out
        </div>
        
        <div class="view-controls">
            <div class="control-group">
                <label style="font-weight: 600; color: #5a67d8;" id="target-label">Target Profile</label>
                <select id="preset-select" onchange="loadTargetPreset()">
                    <option value="orange" selected>Orange</option>
                    <option value="kiwi">Kiwi</option>
                    <option value="potato">Potato</option>
                    <option value="carrot">Carrot</option>
                    <option value="apple">Apple</option>
                </select>
            </div>
            <div class="control-group">
                <label for="points-count-select">Number of Points</label>
                <select id="points-count-select" onchange="handlePointsCountChange()">
                </select>
            </div>
            <div class="control-group">
                <label for="opacity-slider">Peel Opacity</label>
                <input type="range" id="opacity-slider" min="0.05" max="1.0" step="0.05" value="0.4" oninput="updateVisualization()">
            </div>
            <div class="control-group">
                <label for="grid-toggle">Coordinate Grid</label>
                <input type="checkbox" id="grid-toggle" checked onchange="updateVisualization()">
            </div>
        </div>

        <div class="scrollable-content">
            <table>
                <thead>
                    <tr>
                        <th>Expression</th>
                        <th>Position (X)</th>
                        <th>Radius r(x)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>

    <button id="play-button" onclick="handleActionButtonClick()">
        <svg id="button-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <span id="button-text">Play Animation</span>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scaleFactor = 4;
        
        let isAnimatingVolume = false;
        let animationProgress = 0.0;
        let hasAnimated = false; 
        const animationSpeed = 0.008; 

        const presets = {
            orange: {
                data: [{x:9,r:0},{x:9,r:1.65},{x:8,r:3.35},{x:7,r:4.1},{x:6,r:4.55},{x:5,r:4.75},{x:4,r:4.8},{x:3,r:4.6},{x:2,r:4.05},{x:1,r:2.85},{x:0,r:0}],
                roughness: 0.5, clearcoat: 0.4, bumpScale: 0.007, stemColor: 0x3d5229, stemVisible: true,
                drawTextures: (mCtx, bCtx) => {
                    mCtx.fillStyle = '#ff7605'; mCtx.fillRect(0,0,512,512);
                    bCtx.fillStyle = '#808080'; bCtx.fillRect(0,0,512,512);
                    for(let i=0; i<25000; i++) {
                        let x = Math.random()*512; let y = Math.random()*512; let radius = Math.random()*1.4+0.4;
                        mCtx.fillStyle = Math.random() > 0.5 ? '#ff851c' : '#e06200'; mCtx.globalAlpha = 0.18;
                        mCtx.beginPath(); mCtx.arc(x,y,radius*4,0,Math.PI*2); mCtx.fill();
                        bCtx.fillStyle = Math.random() > 0.45 ? '#ffffff' : '#1a1a1a'; bCtx.globalAlpha = 0.22;
                        bCtx.beginPath(); bCtx.arc(x,y,radius,0,Math.PI*2); mCtx.fill();
                    }
                }
            },
            kiwi: {
                data: [{x:8.5,r:0},{x:8,r:2.1},{x:7,r:3.1},{x:6,r:3.5},{x:5,r:3.6},{x:4,r:3.6},{x:3,r:3.5},{x:2,r:3.2},{x:1,r:2.3},{x:0.5,r:0}],
                roughness: 0.9, clearcoat: 0.0, bumpScale: 0.015, stemColor: 0x221a12, stemVisible: false,
                drawTextures: (mCtx, bCtx) => {
                    mCtx.fillStyle = '#705133'; mCtx.fillRect(0,0,512,512);
                    bCtx.fillStyle = '#808080'; bCtx.fillRect(0,0,512,512);
                    for(let i=0; i<45000; i++) {
                        let x = Math.random()*512; let y = Math.random()*512;
                        mCtx.fillStyle = Math.random() > 0.5 ? '#5c4127' : '#82613f'; mCtx.globalAlpha = 0.25;
                        mCtx.fillRect(x, y, Math.random()*2+1, Math.random()*5+2);
                        bCtx.fillStyle = Math.random() > 0.5 ? '#ffffff' : '#000000'; bCtx.globalAlpha = 0.35;
                        bCtx.fillRect(x, y, 1, Math.random()*4+1);
                    }
                }
            },
            potato: {
                data: [{x:10,r:0},{x:9,r:1.8},{x:7.5,r:2.7},{x:6,r:3.0},{x:4.5,r:2.9},{x:3,r:2.8},{x:1.5,r:2.2},{x:0,r:0}],
                roughness: 0.85, clearcoat: 0.0, bumpScale: 0.012, stemColor: 0x1a120b, stemVisible: false,
                drawTextures: (mCtx, bCtx) => {
                    mCtx.fillStyle = '#b38f5c'; mCtx.fillRect(0,0,512,512);
                    bCtx.fillStyle = '#808080'; bCtx.fillRect(0,0,512,512);
                    for(let i=0; i<300; i++) {
                        let x = Math.random()*512; let y = Math.random()*512; let r = Math.random()*25+5;
                        mCtx.fillStyle = '#8a6a3e'; mCtx.globalAlpha = 0.15;
                        mCtx.beginPath(); mCtx.arc(x,y,r,0,Math.PI*2); mCtx.fill();
                    }
                    for(let i=0; i<15; i++) {
                        let x = Math.random()*512; let y = Math.random()*512;
                        mCtx.fillStyle = '#594121'; mCtx.globalAlpha = 0.7;
                        mCtx.beginPath(); mCtx.arc(x,y,4,0,Math.PI*2); mCtx.fill();
                        bCtx.fillStyle = '#000000'; bCtx.globalAlpha = 0.6;
                        bCtx.beginPath(); mCtx.arc(x,y,5,0,Math.PI*2); mCtx.fill();
                    }
                }
            },
            carrot: {
                data: [{x:11,r:0},{x:10,r:1.2},{x:8.5,r:1.4},{x:7,r:1.5},{x:5,r:1.3},{x:3,r:1.0},{x:1,r:0.6},{x:0,r:0}],
                roughness: 0.6, clearcoat: 0.15, bumpScale: 0.01, stemColor: 0x517332, stemVisible: true,
                drawTextures: (mCtx, bCtx) => {
                    mCtx.fillStyle = '#ff6b00'; mCtx.fillRect(0,0,512,512);
                    bCtx.fillStyle = '#808080'; bCtx.fillRect(0,0,512,512);
                    for(let i=0; i<50; i++) {
                        let y = Math.random()*512;
                        mCtx.fillStyle = '#d95b00'; mCtx.globalAlpha = 0.4;
                        mCtx.fillRect(0, y, 512, Math.random()*6+2);
                        bCtx.fillStyle = '#222222'; bCtx.globalAlpha = 0.3;
                        bCtx.fillRect(0, y, 512, 3);
                    }
                }
            },
            apple: {
                data: [{x:7.5,r:0},{x:7,r:2.4},{x:6,r:3.8},{x:4.5,r:4.1},{x:3,r:4.0},{x:1.5,r:3.4},{x:0.5,r:2.0},{x:0,r:0}],
                roughness: 0.22, clearcoat: 0.8, bumpScale: 0.003, stemColor: 0x2b1e11, stemVisible: true,
                drawTextures: (mCtx, bCtx) => {
                    mCtx.fillStyle = '#cc1818'; mCtx.fillRect(0,0,512,512);
                    bCtx.fillStyle = '#808080'; bCtx.fillRect(0,0,512,512);
                    for(let i=0; i<150; i++) {
                        let x = Math.random()*512;
                        mCtx.fillStyle = '#e6c822'; mCtx.globalAlpha = 0.2;
                        mCtx.fillRect(x, 0, Math.random()*25+5, 512);
                    }
                    for(let i=0; i<6000; i++) {
                        let x = Math.random()*512; let y = Math.random()*512;
                        mCtx.fillStyle = '#ffebb3'; mCtx.globalAlpha = 0.35;
                        mCtx.fillRect(x, y, 1.5, 1.5);
                    }
                }
            }
        };

        let activePresetPointsData = []; 
        let runtimePoints = [];
        let visualMarkers = [];
        let circumferenceRings = [];
        
        const desmosColors = [
            0xc74440, 0x2d70b3, 0x388c46, 0x6042a6, 0xfa7e19, 0x00a3a3,
            0xb8255f, 0x3d85c6, 0x274e13, 0x674ea7, 0xa64d79, 0xe69138,
        ];
        const markerGeo = new THREE.SphereGeometry(0.025, 16, 16);

        const mapCanvas = document.createElement('canvas');
        const bumpCanvas = document.createElement('canvas');
        mapCanvas.width = bumpCanvas.width = 512;
        mapCanvas.height = bumpCanvas.height = 512;
        const mCtx = mapCanvas.getContext('2d');
        const bCtx = bumpCanvas.getContext('2d');

        const textureColor = new THREE.CanvasTexture(mapCanvas);
        const textureBump = new THREE.CanvasTexture(bumpCanvas);
        textureColor.wrapS = textureColor.wrapT = textureBump.wrapS = textureBump.wrapT = THREE.RepeatWrapping;
        textureColor.repeat.set(4, 3); textureBump.repeat.set(4, 3);

        function loadTargetPreset() {
            isAnimatingVolume = false;
            hasAnimated = false;

            const playBtn = document.getElementById('play-button');
            playBtn.classList.remove('reset-state');
            document.getElementById('button-text').innerText = "Play Animation";
            document.getElementById('button-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';

            const currentPresetKey = document.getElementById('preset-select').value;
            const target = presets[currentPresetKey];

            mCtx.globalAlpha = 1.0; bCtx.globalAlpha = 1.0;
            target.drawTextures(mCtx, bCtx);
            textureColor.needsUpdate = true;
            textureBump.needsUpdate = true;

            fruitMaterial.roughness = target.roughness;
            fruitMaterial.clearcoat = target.clearcoat;
            fruitMaterial.bumpScale = target.bumpScale;
            stemMat.color.setHex(target.stemColor);
            stemGroup.visible = target.stemVisible;

            activePresetPointsData = target.data.map(d => ({ x: d.x, r: d.r }));

            const countSelect = document.getElementById('points-count-select');
            countSelect.innerHTML = '';
            for (let k = 3; k <= activePresetPointsData.length; k++) {
                const opt = document.createElement('option');
                opt.value = k;
                opt.innerText = k;
                if (k === activePresetPointsData.length) opt.selected = true;
                countSelect.appendChild(opt);
            }

            buildControlTableAndMeshes(activePresetPointsData.length);
        }

        function handlePointsCountChange() {
            const targetSize = parseInt(document.getElementById('points-count-select').value);
            buildControlTableAndMeshes(targetSize);
        }

        function buildControlTableAndMeshes(numPointsToUse) {
            if (activePresetPointsData.length > numPointsToUse) {
                activePresetPointsData = activePresetPointsData.slice(0, numPointsToUse);
            } else if (activePresetPointsData.length < numPointsToUse) {
                const lastElement = activePresetPointsData[activePresetPointsData.length - 1] || { x: 0, r: 0 };
                while (activePresetPointsData.length < numPointsToUse) {
                    activePresetPointsData.push({ x: lastElement.x, r: lastElement.r });
                }
            }

            runtimePoints = [];
            
            while(overlayGroup.children.length > 0){
                overlayGroup.children[0].geometry.dispose();
                overlayGroup.remove(overlayGroup.children[0]);
            }
            visualMarkers = [];
            circumferenceRings = [];

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            activePresetPointsData.forEach((data, i) => {
                runtimePoints.push({ x: data.x / scaleFactor, r: data.r / scaleFactor });

                const colorHex = desmosColors[i % desmosColors.length];
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td class="point-label" style="color: #${colorHex.toString(16).padStart(6, '0')}">e<sub>${i+1}</sub>(y)</td>
                    <td><input type="number" id="x-${i}" value="${data.x}" step="0.5" oninput="updateDataFields(${i})"></td>
                    <td><input type="number" id="r-${i}" value="${data.r}" step="0.05" oninput="updateDataFields(${i})"></td>
                `;
                tbody.appendChild(tr);

                const specificMat = new THREE.MeshBasicMaterial({ color: colorHex });
                const markerMesh = new THREE.Mesh(markerGeo, specificMat);
                overlayGroup.add(markerMesh);
                visualMarkers.push(markerMesh);

                const ringMat = new THREE.MeshBasicMaterial({ 
                    color: colorHex, 
                    side: THREE.DoubleSide
                });
                const ringMesh = new THREE.Mesh(new THREE.BufferGeometry(), ringMat);
                overlayGroup.add(ringMesh);
                circumferenceRings.push(ringMesh);
            });

            updateGeometry(hasAnimated ? animationProgress * Math.PI * 2 : Math.PI * 2); 
            updateVisualization();
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x121212); 

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(1.5, 1.5, 4.0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputEncoding = THREE.sRGBEncoding; 
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };

        // Original colors preserved for dark mode setup
        let measurementGrid = new THREE.GridHelper(8, 32, 0x444444, 0x222222);
        measurementGrid.position.y = -1.2;
        scene.add(measurementGrid);

        const axisPoints = [new THREE.Vector3(-3, 0, 0), new THREE.Vector3(3, 0, 0)];
        const axisGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
        const axisMat = new THREE.LineDashedMaterial({ color: 0x5a67d8, dashSize: 0.08, gapSize: 0.05 }); 
        const axisLine = new THREE.Line(axisGeo, axisMat);
        axisLine.computeLineDistances();
        scene.add(axisLine);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xffffff, 1.4); 
        keyLight.position.set(5, 8, 5);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xfff5ea, 0.5);
        fillLight.position.set(-5, 2, -3);
        scene.add(fillLight);

        const fruitMaterial = new THREE.MeshPhysicalMaterial({
            map: textureColor, bumpMap: textureBump,
            metalness: 0.0, reflectivity: 0.6,
            transparent: true, opacity: 0.4, side: THREE.DoubleSide,
            depthWrite: false 
        });

        let fruitGeometry = new THREE.BufferGeometry();
        const fruitMesh = new THREE.Mesh(fruitGeometry, fruitMaterial);
        scene.add(fruitMesh);

        const stemGroup = new THREE.Group();
        const stemBaseGeo = new THREE.CylinderGeometry(0.025, 0.008, 0.04, 12);
        const stemGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.12, 8);
        const stemMat = new THREE.MeshStandardMaterial({ roughness: 0.9 });
        const stemBase = new THREE.Mesh(stemBaseGeo, stemMat);
        const stemStick = new THREE.Mesh(stemGeo, stemMat);
        stemStick.position.z = 0.05; stemStick.rotation.x = Math.PI / 2; 
        stemGroup.add(stemBase, stemStick);
        scene.add(stemGroup); 

        const overlayGroup = new THREE.Group();
        scene.add(overlayGroup); 

        function updateDataFields(index) {
            const xVal = parseFloat(document.getElementById(`x-${index}`).value) || 0;
            const rVal = parseFloat(document.getElementById(`r-${index}`).value) || 0;
            
            activePresetPointsData[index].x = xVal;
            activePresetPointsData[index].r = rVal;

            runtimePoints[index].x = xVal / scaleFactor;
            runtimePoints[index].r = rVal / scaleFactor;
            updateGeometry(hasAnimated ? animationProgress * Math.PI * 2 : Math.PI * 2);
        }

        function updateGeometry(phiLength = Math.PI * 2) {
            const lathePoints = [];
            const count = runtimePoints.length;
            if (count === 0) return;

            const showGrid = document.getElementById('grid-toggle').checked;
            const discThickness = 0.035; 
            const borderRingThickness = 0.02; 

            for (let i = 0; i < count; i++) {
                const radiusR = runtimePoints[i].r;
                const positionX = runtimePoints[i].x;
                
                lathePoints.push(new THREE.Vector2(radiusR, positionX));
                if (visualMarkers[i]) visualMarkers[i].position.set(positionX, radiusR, 0);

                if (radiusR > 0.001 && phiLength > 0.001 && hasAnimated && circumferenceRings[i]) {
                    circumferenceRings[i].geometry.dispose();

                    const hollowDiscProfile = [
                        new THREE.Vector2(radiusR - borderRingThickness, positionX - discThickness / 2),
                        new THREE.Vector2(radiusR + 0.004,               positionX - discThickness / 2), 
                        new THREE.Vector2(radiusR + 0.004,               positionX + discThickness / 2),
                        new THREE.Vector2(radiusR - borderRingThickness, positionX + discThickness / 2)
                    ];
                    
                    const ringGeo = new THREE.LatheGeometry(hollowDiscProfile, 64, 0, phiLength);
                    ringGeo.rotateZ(-Math.PI / 2);
                    
                    circumferenceRings[i].geometry = ringGeo;
                    circumferenceRings[i].visible = showGrid;
                } else if (circumferenceRings[i]) {
                    circumferenceRings[i].visible = false;
                }
            }

            fruitMesh.geometry.dispose();
            
            const splineCurve = new THREE.SplineCurve(lathePoints);
            const smoothProfilePoints = splineCurve.getPoints(128);
            
            if (smoothProfilePoints.length > 2) {
                smoothProfilePoints[1].y = smoothProfilePoints[0].y; 
                smoothProfilePoints[smoothProfilePoints.length - 2].y = smoothProfilePoints[smoothProfilePoints.length - 1].y;
            }

            const safePhi = Math.max(0.001, phiLength);
            const temporaryGeo = new THREE.LatheGeometry(smoothProfilePoints, 128, 0, safePhi); 
            temporaryGeo.rotateZ(-Math.PI / 2); 
            
            fruitMesh.geometry = temporaryGeo;

            if(runtimePoints[0]) {
                stemGroup.position.set(runtimePoints[0].x, 0, 0);
                stemGroup.rotation.set(0, 0, -Math.PI / 2);
                const midX = (runtimePoints[0].x + runtimePoints[count - 1].x) / 2;
                controls.target.set(midX, 0, 0);
            }
        }

        function updateVisualization() {
            const opacityVal = parseFloat(document.getElementById('opacity-slider').value);
            const showGrid = document.getElementById('grid-toggle').checked;
            fruitMaterial.opacity = opacityVal;
            measurementGrid.visible = showGrid;
            axisLine.visible = showGrid;
            
            circumferenceRings.forEach((ring, i) => {
                if (runtimePoints[i] && runtimePoints[i].r > 0.001 && hasAnimated && animationProgress > 0.001) {
                    ring.visible = showGrid;
                } else if (ring) {
                    ring.visible = false;
                }
            });
        }

        function handleActionButtonClick() {
            if (hasAnimated && !isAnimatingVolume) {
                resetToPreAnimationState();
            } else if (!isAnimatingVolume) {
                startRevolutionAnimation();
            }
        }

        function startRevolutionAnimation() {
            animationProgress = 0.001; 
            isAnimatingVolume = true;
            hasAnimated = true;

            const playBtn = document.getElementById('play-button');
            playBtn.classList.add('reset-state');
            document.getElementById('button-text').innerText = "Reset View";
            document.getElementById('button-icon').innerHTML = '<path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>';
        }

        function resetToPreAnimationState() {
            isAnimatingVolume = false;
            animationProgress = 0.0;
            hasAnimated = false;

            const playBtn = document.getElementById('play-button');
            playBtn.classList.remove('reset-state');
            document.getElementById('button-text').innerText = "Play Animation";
            document.getElementById('button-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';

            updateGeometry(Math.PI * 2);
            updateVisualization();
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-mode');
            
            const isLight = body.classList.contains('light-mode');
            scene.background.setHex(isLight ? 0xffffff : 0x121212);
            
            scene.remove(measurementGrid);
            // Modified: Uses sharp dark black (0x111111 / 0xcccccc) when in light mode, original colors in dark mode.
            measurementGrid = new THREE.GridHelper(
                8, 
                32, 
                isLight ? 0x111111 : 0x444444, 
                isLight ? 0xcccccc : 0x222222
            );
            measurementGrid.position.y = -1.2;
            measurementGrid.visible = document.getElementById('grid-toggle').checked;
            scene.add(measurementGrid);

            axisMat.color.setHex(isLight ? 0x111111 : 0x5a67d8);
            document.getElementById('target-label').style.color = isLight ? '#4752c4' : '#5a67d8';
        }

        loadTargetPreset();

        function animate() {
            requestAnimationFrame(animate);

            if (isAnimatingVolume) {
                animationProgress += animationSpeed;
                if (animationProgress >= 1.0) {
                    animationProgress = 1.0;
                    isAnimatingVolume = false; 
                }
                const sweepAngle = animationProgress * Math.PI * 2;
                updateGeometry(sweepAngle);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
