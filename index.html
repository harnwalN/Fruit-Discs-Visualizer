<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculus Volume Visualizer</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
            user-select: none;
            transition: background-color 0.3s ease;
        }
        
        body.light-mode {
            background-color: #ffffff;
            color: #333333;
        }

        #control-panel {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background: #1e1e1e;
            border-right: 2px solid #333333;
            padding: 20px;
            width: 420px; 
            min-width: 360px;
            max-width: 600px;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.2);
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            resize: horizontal;
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        body.light-mode #control-panel {
            background: #f8f9fa;
            border-right: 2px solid #dcdee0;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.03);
        }

        .scrollable-content {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
            margin-top: 10px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            transition: color 0.3s;
        }
        body.light-mode h2 { color: #111111; }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5a67d8;
            margin: 15px 0 5px 0;
            font-weight: 700;
        }
        body.light-mode .section-title { color: #4752c4; }

        #math-panel {
            background: #151515;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s;
        }
        body.light-mode #math-panel {
            background: #f1f3f5;
            border-color: #dcdee0;
        }

        .volume-readout {
            margin-top: 6px;
            font-size: 0.88rem;
            display: flex;
            justify-content: space-between;
        }

        .view-controls {
            background: #252525;
            border: 1px solid #3d3d3d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s;
        }
        body.light-mode .view-controls {
            background: #ffffff;
            border-color: #e4e6e8;
        }

        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        label {
            font-weight: 500;
            color: #cccccc;
            transition: color 0.3s;
        }
        body.light-mode label { color: #444444; }

        select, input[type="text"] {
            width: 175px;
            background: #333333;
            border: 1px solid #555555;
            color: #ffffff;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        body.light-mode select, body.light-mode input[type="text"] {
            background: #ffffff;
            border-color: #c1c4c8;
            color: #111111;
        }

        input[type="text"] {
            width: 163px;
            font-family: monospace;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        th {
            text-align: left;
            padding-bottom: 6px;
            color: #888888;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.68rem;
            border-bottom: 1px solid #3d3d3d;
        }
        body.light-mode th { border-bottom-color: #e4e6e8; }

        td {
            padding: 4px 0;
            border-bottom: 1px solid #252525;
        }
        body.light-mode td { border-bottom-color: #f1f3f5; }

        .point-label { font-weight: 600; font-family: monospace; }

        input[type="number"] {
            width: 55px;
            background: #333333;
            border: 1px solid #555555;
            color: #ffffff;
            padding: 4px;
            border-radius: 4px;
            font-family: monospace;
            text-align: center;
        }
        body.light-mode input[type="number"] { background: #ffffff; border-color: #c1c4c8; color: #111111; }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: #5a67d8;
            font-weight: bold;
            min-width: 24px;
            text-align: right;
        }
        body.light-mode .slider-value { color: #4752c4; }

        input[type="range"] { width: 115px; accent-color: #5a67d8; }
        body.light-mode input[type="range"] { accent-color: #4752c4; }

        #play-button {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: #5a67d8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(90, 103, 216, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: background 0.2s;
        }
        body.light-mode #play-button { background: #4752c4; }
        #play-button.playing-state { background: #e53e3e; }

        #mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2d2d2d;
            border: 1px solid #444444;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f3f5;
        }
        body.light-mode #mode-toggle { background: #f1f3f5; border-color: #dcdee0; color: #333333; }
        #mode-toggle svg { width: 18px; height: 18px; fill: currentColor; }
        body.light-mode #mode-toggle .moon-icon { display: block; }
        body.light-mode #mode-toggle .sun-icon { display: none; }
        #mode-toggle .moon-icon { display: none; }
        
        .error-msg {
            color: #e53e3e;
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <button id="mode-toggle" onclick="toggleTheme()">
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3zm0-10c.6 0 1-.4 1-1V3c0-.6-.4-1-1-1s-1 .4-1 1v1c0 .6.4 1 1 1zm0 14c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1s1-.4 1-1v-1c0-.6-.4-1-1-1zM5 12c0-.6-.4-1-1-1H3c-.6 0-1 .4-1 1s.4 1 1 1h1c.6 0 1-.4 1-1zm12.2-5.8c.4.4 1 .4 1.4 0l.7-.7c.4-.4.4-1 0-1.4s-1-.4-1.4 0l-.7.7c-.4.4-.4 1 0 1.4z"/></svg>
    </button>

    <div id="control-panel">
        <h2>Volume Visualizer</h2>
        
        <div id="math-panel">
            <div id="latex-formula">\(V = \pi \int_{a}^{b} [r(x)]^2 dx\)</div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;">
            <div class="volume-readout">
                <span>Exact Volume (\(\int\)):</span>
                <span id="exact-volume" style="font-weight: bold; color: #48bb78;">--</span>
            </div>
            <div class="volume-readout" id="approx-readout-row">
                <span>Approx. Slice Sum (\(\Sigma\)):</span>
                <span id="approx-volume" style="font-weight: bold; color: #5a67d8;">--</span>
            </div>
        </div>

        <div class="scrollable-content">
            <div class="section-title">Model Profiles</div>
            <div class="view-controls">
                <div class="control-group">
                    <label>Target Preset</label>
                    <select id="preset-select" onchange="loadTargetPreset()">
                        <optgroup label="Fruit Geometries">
                            <option value="orange" selected>Orange</option>
                            <option value="kiwi">Kiwi</option>
                            <option value="potato">Potato</option>
                            <option value="carrot">Carrot</option>
                            <option value="apple">Apple</option>
                        </optgroup>
                        <optgroup label="Theoretical Math Models">
                            <option value="math_disk">Disk: r(x) = √x</option>
                            <option value="math_washer">Washers</option>
                            <option value="math_cs_square">Cross-Section: Squares on y=√x</option>
                            <option value="math_cs_triangle">Cross-Section: Right Triangles</option>
                            <option value="math_cs_equilateral">Cross-Section: Equilateral Δ</option>
                        </optgroup>
                        <optgroup label="Custom Input">
                            <option value="custom_equation">Custom Equation f(x)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="control-group" id="points-count-row">
                    <label>Active Input Points</label>
                    <select id="points-count-select" onchange="handlePointsCountChange()"></select>
                </div>
            </div>

            <div id="custom-equation-controls" class="view-controls" style="display: none;">
                <div class="control-group">
                    <label>f(x) =</label>
                    <div>
                        <input type="text" id="custom-f-string" value="Math.sin(x) + 1.5" oninput="parseCustomEquation()">
                        <div id="equation-error" class="error-msg">Invalid math syntax</div>
                    </div>
                </div>
                <div class="control-group">
                    <label>Interval [a, b]</label>
                    <div>
                        <input type="number" id="custom-a" value="0" step="0.5" style="width:45px;" oninput="parseCustomEquation()"> to 
                        <input type="number" id="custom-b" value="6" step="0.5" style="width:45px;" oninput="parseCustomEquation()">
                    </div>
                </div>
                <div class="control-group">
                    <label>Axis of Revolution</label>
                    <select id="custom-axis" onchange="parseCustomEquation()" style="width:110px;">
                        <option value="x" selected>X-Axis</option>
                        <option value="y">Y-Axis (Shells)</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Riemann & Render Settings</div>
            <div class="view-controls">
                <div class="control-group" id="approx-mode-row">
                    <label>Approximation Mode</label>
                    <select id="render-mode" onchange="updateVisualization()">
                        <option value="disks" selected>Discrete</option>
                        <option value="smooth">Smooth</option>
                    </select>
                </div>
                <div class="control-group" id="disk-count-row">
                    <label>Subdivisions (n)</label>
                    <div class="slider-container">
                        <input type="range" id="disk-count" min="3" max="100" step="1" value="10" oninput="updateVisualization()">
                        <span id="disk-count-val" class="slider-value">10</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Animation Speed</label>
                    <input type="range" id="speed-slider" min="0.002" max="0.03" step="0.002" value="0.008">
                </div>
                <div class="control-group">
                    <label>Peel Opacity</label>
                    <input type="range" id="opacity-slider" min="0.05" max="1.0" step="0.05" value="0.7" oninput="updateVisualization()">
                </div>
                <div class="control-group">
                    <label>Coordinate Grid</label>
                    <input type="checkbox" id="grid-toggle" checked onchange="updateVisualization()">
                </div>
            </div>

            <div id="coordinates-section">
                <div class="section-title">Profile Coordinates</div>
                <table>
                    <thead>
                        <tr>
                            <th>Node</th>
                            <th>Position (X)</th>
                            <th>Radius r(x)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <button id="play-button" onclick="handleActionButtonClick()">
        <svg id="button-icon" viewBox="0 0 24 24" width="16"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
        <span id="button-text">Play Animation</span>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scaleFactor = 4;
        let isAnimatingVolume = false, animationProgress = 0.0, hasAnimated = false;

        const coreColors = { orange: '#fce3b6', kiwi: '#d5e6a1', potato: '#ebdca2', carrot: '#ff9d42', apple: '#fbfade' };

        const presets = {
            orange: { isMath: false, isCustom: false, data: [{x:0,r:0},{x:1,r:2.85},{x:2,r:4.05},{x:3,r:4.6},{x:4,r:4.8},{x:5,r:4.75},{x:6,r:4.55},{x:7,r:4.1},{x:8,r:3.35},{x:9,r:1.65},{x:10,r:0}], roughness: 0.5, clearcoat: 0.4, bumpScale: 0.007, stemColor: 0x3d5229, stemVisible: true, draw: (m, b) => { m.fillStyle = '#ff7605'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); } },
            kiwi: { isMath: false, isCustom: false, data: [{x:0.5,r:0},{x:1.5,r:2.3},{x:2.5,r:3.2},{x:3.5,r:3.5},{x:4.5,r:3.6},{x:5.5,r:3.6},{x:6.5,r:3.5},{x:7.5,r:3.1},{x:8.5,r:2.1},{x:9.5,r:0}], roughness: 0.9, clearcoat: 0.0, bumpScale: 0.015, stemColor: 0x221a12, stemVisible: false, draw: (m, b) => { m.fillStyle = '#705133'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); } },
            potato: { isMath: false, isCustom: false, data: [{x:0,r:0},{x:1.5,r:2.2},{x:3.0,r:2.8},{x:4.5,r:2.9},{x:6.0,r:3.0},{x:7.5,r:2.7},{x:9.0,r:1.8},{x:10.5,r:0}], roughness: 0.85, clearcoat: 0.0, bumpScale: 0.012, stemColor: 0x1a120b, stemVisible: false, draw: (m, b) => { m.fillStyle = '#b38f5c'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); } },
            carrot: { isMath: false, isCustom: false, data: [{x:0,r:0},{x:1.5,r:0.6},{x:3.0,r:1.0},{x:4.5,r:1.3},{x:6.0,r:1.5},{x:7.5,r:1.4},{x:9.0,r:1.2},{x:10.5,r:0}], roughness: 0.6, clearcoat: 0.15, bumpScale: 0.01, stemColor: 0x517332, stemVisible: true, draw: (m, b) => { m.fillStyle = '#ff6b00'; m.fillRect(0,0,512,512); b.fillStyle = '#808080'; b.fillRect(0,0,512,512); } },
            apple: { 
                isMath: false, 
                isCustom: false, 
                data: [
                    {x: 0.0, r: 0.0},
                    {x: 0.4, r: 1.5},
                    {x: 1.2, r: 3.6},
                    {x: 2.2, r: 4.4},
                    {x: 3.5, r: 4.2},
                    {x: 4.8, r: 3.7},
                    {x: 5.8, r: 3.0},
                    {x: 6.6, r: 2.3},
                    {x: 7.0, r: 0.8},
                    {x: 7.2, r: 0.0}
                ], 
                roughness: 0.22, 
                clearcoat: 0.8, 
                bumpScale: 0.003, 
                stemColor: 0x2b1e11, 
                stemVisible: true, 
                draw: (m, b) => { 
                    m.fillStyle = '#cc1818'; m.fillRect(0,0,512,512); 
                    b.fillStyle = '#808080'; b.fillRect(0,0,512,512); 
                } 
            },
            
            math_disk: { isMath: true, isCustom: false, type: 'disk', xStart: 0, xEnd: 4, f: (x) => Math.sqrt(x), g: (x) => 0, color: 0x3182ce },
            math_washer: { isMath: true, isCustom: false, type: 'washer', xStart: 0.5, xEnd: 4.0, f: (x) => Math.sqrt(x) + 1.5, g: (x) => 0.5 * x, color: 0xdd6b20 },
            math_cs_square: { isMath: true, isCustom: false, type: 'cs_square', xStart: 0, xEnd: 4, f: (x) => Math.sqrt(x), g: (x) => 0, color: 0x38a169 },
            math_cs_triangle: { isMath: true, isCustom: false, type: 'cs_triangle', xStart: 0, xEnd: 3, f: (x) => 1 + (x/2), g: (x) => 0, color: 0x805ad5 },
            math_cs_equilateral: { isMath: true, isCustom: false, type: 'cs_equilateral', xStart: 0, xEnd: Math.PI, f: (x) => Math.sin(x) * 1.5, g: (x) => 0, color: 0xe53e3e },
            
            custom_equation: { isMath: false, isCustom: true, color: 0x00b5d8 }
        };

        let activePresetPointsData = [], runtimePoints = [], visualMarkers = [];
        let parsedUserCompiledFn = (x) => Math.sqrt(x); 
        const desmosColors = [0xc74440, 0x2d70b3, 0x388c46, 0x6042a6, 0xfa7e19, 0x00a3a3];
        const markerGeo = new THREE.SphereGeometry(0.025, 16, 16);

        const mapCanvas = document.createElement('canvas'), bumpCanvas = document.createElement('canvas');
        mapCanvas.width = bumpCanvas.width = 512; mapCanvas.height = bumpCanvas.height = 512;
        const mCtx = mapCanvas.getContext('2d'), bCtx = bumpCanvas.getContext('2d');
        const textureColor = new THREE.CanvasTexture(mapCanvas), textureBump = new THREE.CanvasTexture(bumpCanvas);

        const fruitMaterial = new THREE.MeshPhysicalMaterial({
            map: textureColor, bumpMap: textureBump, metalness: 0.0, reflectivity: 0.5,
            transparent: true, opacity: 0.7, side: THREE.DoubleSide, depthWrite: true
        });

        const interiorMaterial = new THREE.MeshStandardMaterial({ roughness: 0.8, side: THREE.DoubleSide });
        const mathSolidMaterial = new THREE.MeshStandardMaterial({ roughness: 0.4, metalness: 0.1, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });

        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x121212);
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2.5, 3.0, 5.0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let measurementGrid = new THREE.GridHelper(8, 32, 0x444444, 0x222222);
        measurementGrid.position.y = -1.2; scene.add(measurementGrid);

        const axisLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-3,0,0), new THREE.Vector3(3,0,0)]), new THREE.LineDashedMaterial({ color: 0x5a67d8, dashSize: 0.08, gapSize: 0.05 }));
        axisLine.computeLineDistances(); scene.add(axisLine);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.4); keyLight.position.set(5, 8, 5); scene.add(keyLight);

        let fruitMesh = new THREE.Mesh(new THREE.BufferGeometry(), fruitMaterial); scene.add(fruitMesh);
        let diskGroup = new THREE.Group(); scene.add(diskGroup);
        const overlayGroup = new THREE.Group(); scene.add(overlayGroup);

        const stemGroup = new THREE.Group();
        const stemMat = new THREE.MeshStandardMaterial({ roughness: 0.9 });
        const stemBase = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.008, 0.04, 12), stemMat);
        const stemStick = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.12, 8), stemMat);
        stemStick.position.z = 0.05; stemStick.rotation.x = Math.PI / 2;
        stemGroup.add(stemBase, stemStick); scene.add(stemGroup);

        function evaluateSplineRadius(xTarget) {
            if (runtimePoints.length === 0) return 0;
            
            const pts = [...runtimePoints].sort((a, b) => a.x - b.x);
            
            if (xTarget <= pts[0].x) return Math.max(0, pts[0].r * scaleFactor);
            if (xTarget >= pts[pts.length - 1].x) return Math.max(0, pts[pts.length - 1].r * scaleFactor);
            
            let i = 0;
            while (i < pts.length - 1 && xTarget > pts[i+1].x) {
                i++;
            }
            
            const p1 = pts[i];
            const p2 = pts[i+1];
            const p0 = i > 0 ? pts[i-1] : p1;
            const p3 = i < pts.length - 2 ? pts[i+2] : p2;
            
            const t = (xTarget - p1.x) / (p2.x - p1.x);
            
            const t2 = t * t;
            const t3 = t2 * t;
            
            const f1 = -0.5 * t3 + t2 - 0.5 * t;
            const f2 = 1.5 * t3 - 2.5 * t2 + 1.0;
            const f3 = -1.5 * t3 + 2.0 * t2 + 0.5 * t;
            const f4 = 0.5 * t3 - 0.5 * t2;
            
            const calculatedRadius = (p0.r * f1 + p1.r * f2 + p2.r * f3 + p3.r * f4) * scaleFactor;
            return Math.max(0, calculatedRadius);
        }

        function parseCustomEquation() {
            const equationStr = document.getElementById('custom-f-string').value;
            const errorDiv = document.getElementById('equation-error');
            
            try {
                const sanitized = equationStr.replace(/Math\./g, '');
                const targetFn = new Function('x', `with (Math) { return ${sanitized}; }`);
                
                const testVal = targetFn(1);
                if (isNaN(testVal)) throw new Error();

                parsedUserCompiledFn = targetFn;
                errorDiv.style.display = 'none';
                updateGeometry(hasAnimated ? animationProgress * Math.PI * 2 : Math.PI * 2);
            } catch (e) {
                errorDiv.style.display = 'block';
            }
        }

        function loadTargetPreset() {
            isAnimatingVolume = false; hasAnimated = false;
            setPlayUI();

            const currentKey = document.getElementById('preset-select').value;
            const target = presets[currentKey];

            const isMathPreset = target.isMath && !target.isCustom;
            
            document.getElementById('coordinates-section').style.display = (!target.isMath && !target.isCustom) ? 'block' : 'none';
            document.getElementById('points-count-row').style.display = (!target.isMath && !target.isCustom) ? 'flex' : 'none';
            document.getElementById('custom-equation-controls').style.display = target.isCustom ? 'block' : 'none';
            document.getElementById('approx-mode-row').style.display = (!target.isMath && !target.isCustom) ? 'flex' : 'none';
            
            document.getElementById('approx-readout-row').style.display = isMathPreset ? 'none' : 'flex';

            stemGroup.visible = false;
            fruitMesh.visible = false;

            while(overlayGroup.children.length > 0) {
                overlayGroup.children[0].geometry.dispose();
                overlayGroup.remove(overlayGroup.children[0]);
            }

            const diskCountSlider = document.getElementById('disk-count');
            const diskCountVal = document.getElementById('disk-count-val');

            if(target.isMath || target.isCustom) {
                diskCountSlider.value = 4;
                diskCountVal.innerText = 4;
                mathSolidMaterial.color.setHex(target.color || 0x3182ce);
                if (target.isCustom) parseCustomEquation();
                else updateGeometry(Math.PI * 2);
            } else {
                interiorMaterial.color.set(coreColors[currentKey] || '#eedcb3');
                mCtx.globalAlpha = 1.0; bCtx.globalAlpha = 1.0;
                target.draw(mCtx, bCtx);
                textureColor.needsUpdate = true; textureBump.needsUpdate = true;

                fruitMaterial.roughness = target.roughness;
                fruitMaterial.clearcoat = target.clearcoat;
                fruitMaterial.bumpScale = target.bumpScale;
                stemMat.color.setHex(target.stemColor);
                stemGroup.visible = target.stemVisible;

                activePresetPointsData = target.data.map(d => ({ x: d.x, r: d.r }));

                const countSelect = document.getElementById('points-count-select');
                countSelect.innerHTML = '';
                for (let k = 4; k <= fullPresetLength(currentKey); k++) {
                    const opt = document.createElement('option');
                    opt.value = k; opt.innerText = k;
                    if (k === activePresetPointsData.length) opt.selected = true;
                    countSelect.appendChild(opt);
                }
                
                const initialSubdivisions = activePresetPointsData.length - 1;
                diskCountSlider.value = initialSubdivisions;
                diskCountVal.innerText = initialSubdivisions;
                buildControlTableAndMeshes(parseInt(countSelect.value));
            }
        }

        function fullPresetLength(key) {
            return presets[key] && presets[key].data ? presets[key].data.length : 8;
        }

        function handlePointsCountChange() {
            const count = parseInt(document.getElementById('points-count-select').value);
            const requiredCrossSections = count - 1;
            document.getElementById('disk-count').value = requiredCrossSections;
            document.getElementById('disk-count-val').innerText = requiredCrossSections;
            buildControlTableAndMeshes(count);
        }

        function buildControlTableAndMeshes(numPointsToUse) {
            const currentKey = document.getElementById('preset-select').value;
            const fullPresetData = presets[currentKey].data;

            activePresetPointsData = [];
            for(let i = 0; i < numPointsToUse; i++) {
                if (fullPresetData[i]) {
                    activePresetPointsData.push({ x: fullPresetData[i].x, r: fullPresetData[i].r });
                } else {
                    const last = activePresetPointsData[activePresetPointsData.length - 1];
                    activePresetPointsData.push({ x: last.x + 1, r: Math.max(0, last.r - 0.5) });
                }
            }

            runtimePoints = [];
            visualMarkers = [];

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            activePresetPointsData.forEach((data, i) => {
                runtimePoints.push({ x: data.x / scaleFactor, r: data.r / scaleFactor });
                const colorHex = desmosColors[i % desmosColors.length];
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="point-label" style="color: #${colorHex.toString(16).padStart(6, '0')}">P<sub>${i}</sub></td>
                    <td><input type="number" id="x-${i}" value="${data.x}" step="0.5" oninput="updateDataFields(${i})"></td>
                    <td><input type="number" id="r-${i}" value="${data.r}" step="0.05" oninput="updateDataFields(${i})"></td>
                `;
                tbody.appendChild(tr);

                const markerMesh = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: colorHex }));
                overlayGroup.add(markerMesh); visualMarkers.push(markerMesh);
            });

            animationProgress = 0.0;
            updateGeometry(Math.PI * 2);
        }

        function updateDataFields(index) {
            const xVal = parseFloat(document.getElementById(`x-${index}`).value) || 0;
            const rVal = parseFloat(document.getElementById(`r-${index}`).value) || 0;
            activePresetPointsData[index].x = xVal; activePresetPointsData[index].r = rVal;
            runtimePoints[index].x = xVal / scaleFactor; runtimePoints[index].r = rVal / scaleFactor;
            
            updateGeometry(hasAnimated ? animationProgress * Math.PI * 2 : Math.PI * 2);
        }

        function getExactTheoreticalVolume(f, g, xStart, xEnd, type, axis) {
            let sum = 0;
            const steps = 500; 
            const dx = (xEnd - xStart) / steps;
            
            for (let i = 0; i < steps; i++) {
                const x = xStart + (i + 0.5) * dx;
                let area = 0;
                
                if (type === 'disk' || (type === 'custom' && axis === 'x')) {
                    area = Math.PI * Math.pow(Math.max(0, f(x)), 2);
                } else if (type === 'custom' && axis === 'y') {
                    area = 2 * Math.PI * Math.abs(x) * Math.max(0, f(x));
                } else if (type === 'washer') {
                    area = Math.PI * (Math.pow(Math.max(0, f(x)), 2) - Math.pow(Math.max(0, g(x)), 2));
                } else if (type === 'cs_square') {
                    area = Math.pow(Math.max(0, f(x)) - Math.max(0, g(x)), 2);
                } else if (type === 'cs_triangle') {
                    area = 0.5 * Math.pow(Math.max(0, f(x)) - Math.max(0, g(x)), 2);
                } else if (type === 'cs_equilateral') {
                    area = (Math.sqrt(3) / 4) * Math.pow(Math.max(0, f(x)) - Math.max(0, g(x)), 2);
                }
                sum += area * dx;
            }
            return sum;
        }

        function getApproximateSliderSum(f, g, xStart, xEnd, type, axis, n) {
            let sum = 0;
            const dx = (xEnd - xStart) / n;
            
            for (let i = 0; i < n; i++) {
                const x = xStart + (i + 0.5) * dx;
                let area = 0;
                
                if (type === 'disk' || (type === 'custom' && axis === 'x')) {
                    area = Math.PI * Math.pow(Math.max(0, f(x)), 2);
                } else if (type === 'custom' && axis === 'y') {
                    area = 2 * Math.PI * Math.abs(x) * Math.max(0, f(x));
                } else if (type === 'washer') {
                    area = Math.PI * (Math.pow(Math.max(0, f(x)), 2) - Math.pow(Math.max(0, g(x)), 2));
                } else if (type === 'cs_square') {
                    area = Math.pow(Math.max(0, f(x)) - Math.max(0, g(x)), 2);
                } else if (type === 'cs_triangle') {
                    area = 0.5 * Math.pow(Math.max(0, f(x)) - Math.max(0, g(x)), 2);
                } else if (type === 'cs_equilateral') {
                    area = (Math.sqrt(3) / 4) * Math.pow(Math.max(0, f(x)) - Math.max(0, g(x)), 2);
                }
                sum += area * dx;
            }
            return sum;
        }

        function updateGeometry(phiLength = Math.PI * 2) {
            const currentKey = document.getElementById('preset-select').value;
            const target = presets[currentKey];
            const n = parseInt(document.getElementById('disk-count').value);
            const renderMode = document.getElementById('render-mode').value;
            const animFactor = phiLength / (Math.PI * 2);

            document.getElementById('disk-count-val').innerText = n;

            if (fruitMesh.geometry) fruitMesh.geometry.dispose();
            while(diskGroup.children.length > 0) {
                diskGroup.children[0].geometry.dispose();
                diskGroup.remove(diskGroup.children[0]);
            }

            let theoreticalExact = 0;
            let theoreticalApprox = 0;
            let latexString = "";
            let unitLabel = target.isMath || target.isCustom ? "u³" : "cm³";

            // ==========================================
            // CASE A: MATH MODELS & CUSTOM EQUATIONS
            // ==========================================
            if (target.isMath || target.isCustom) {
                let xStart = 0, xEnd = 0, f = null, g = null, type = '', axis = 'x';

                if (target.isCustom) {
                    xStart = parseFloat(document.getElementById('custom-a').value) || 0;
                    xEnd = parseFloat(document.getElementById('custom-b').value) || 1;
                    f = parsedUserCompiledFn;
                    g = (x) => 0;
                    type = 'custom';
                    axis = document.getElementById('custom-axis').value;
                } else {
                    xStart = target.xStart; xEnd = target.xEnd;
                    f = target.f; g = target.g; type = target.type;
                }

                const totalW = xEnd - xStart;
                if (totalW <= 0.001) return;

                theoreticalExact = getExactTheoreticalVolume(f, g, xStart, xEnd, type, axis);
                theoreticalApprox = getApproximateSliderSum(f, g, xStart, xEnd, type, axis, n);

                if (type === 'disk') latexString = `V = \\pi \\int_{${xStart}}^{${xEnd}} (\\sqrt{x})^2 dx`;
                else if (type === 'washer') latexString = `V = \\pi \\int_{${xStart.toFixed(1)}}^{${xEnd.toFixed(1)}} \\left[(\\sqrt{x}+1.5)^2 - (0.5x)^2\\right] dx`;
                else if (type === 'cs_square') latexString = `V = \\int_{${xStart}}^{${xEnd}} [\\sqrt{x}]^2 dx`;
                else if (type === 'cs_triangle') latexString = `V = \\int_{${xStart}}^{${xEnd}} \\frac{1}{2} (1 + \\frac{x}{2})^2 dx`;
                else if (type === 'cs_equilateral') latexString = `V = \\int_{${xStart}}^{${xEnd}} \\frac{\\sqrt{3}}{4} (1.5\\sin x)^2 dx`;
                else if (type === 'custom') {
                    latexString = axis === 'x' ? `V = \\pi \\int_{${xStart}}^{${xEnd}} [f(x)]^2 dx` : `V = 2\\pi \\int_{${xStart}}^{${xEnd}} x \\cdot f(x) \\, dx`;
                }

                const dx = totalW / n;
                const centerShift = (xEnd + xStart) / 2;
                for (let i = 0; i < n; i++) {
                    const xm = xStart + (i + 0.5) * dx;
                    const midXScaled = (xm - centerShift) / (scaleFactor / 2.5);
                    const dxScaled = dx / (scaleFactor / 2.5);
                    const evalR = Math.max(0, f(xm)) / (scaleFactor / 2.5);
                    const evalInnerR = Math.max(0, g(xm)) / (scaleFactor / 2.5);

                    if (type === 'disk' || (type === 'custom' && axis === 'x')) {
                        if (evalR > 0.01) {
                            const cyl = new THREE.CylinderGeometry(evalR, evalR, dxScaled, 32, 1, false, 0, phiLength);
                            cyl.rotateZ(Math.PI / 2);
                            const m = new THREE.Mesh(cyl, mathSolidMaterial);
                            m.position.x = midXScaled; diskGroup.add(m);
                        }
                    } else if (type === 'custom' && axis === 'y') {
                        const shellRadius = Math.abs(xm) / (scaleFactor / 2.5);
                        if (evalR > 0.01 && shellRadius > 0.01) {
                            const shellHeight = evalR * animFactor;
                            const shellGeo = new THREE.CylinderGeometry(shellRadius, shellRadius, shellHeight, 32, 1, true, 0, Math.PI * 2);
                            shellGeo.translate(0, shellHeight / 2, 0);
                            const m = new THREE.Mesh(shellGeo, mathSolidMaterial);
                            m.position.x = midXScaled; diskGroup.add(m);
                        }
                    } else if (type === 'washer') {
                        if (evalR > 0.01) {
                            const ringGeo = new THREE.CylinderGeometry(evalR, evalR, dxScaled, 32, 1, true, 0, phiLength);
                            ringGeo.rotateZ(Math.PI / 2);
                            const mOuter = new THREE.Mesh(ringGeo, mathSolidMaterial);
                            mOuter.position.x = midXScaled; diskGroup.add(mOuter);

                            if(evalInnerR > 0.005) {
                                const innerGeo = new THREE.CylinderGeometry(evalInnerR, evalInnerR, dxScaled, 32, 1, true, 0, phiLength);
                                innerGeo.rotateZ(Math.PI / 2);
                                const mInner = new THREE.Mesh(innerGeo, mathSolidMaterial);
                                mInner.position.x = midXScaled; diskGroup.add(mInner);
                            }
                        }
                    } else if (type.startsWith('cs_')) {
                        const baseWidth = evalR - evalInnerR;
                        let shapeGeo = null;

                        if (baseWidth > 0.01) {
                            if (type === 'cs_square') {
                                shapeGeo = new THREE.BoxGeometry(dxScaled, baseWidth * animFactor, baseWidth);
                                shapeGeo.translate(0, (baseWidth * animFactor) / 2, 0);
                            } else if (type === 'cs_triangle') {
                                const trShape = new THREE.Shape();
                                trShape.moveTo(0, 0); trShape.lineTo(baseWidth, 0);
                                trShape.lineTo(0, baseWidth * animFactor); trShape.lineTo(0, 0);
                                shapeGeo = new THREE.ExtrudeGeometry(trShape, { depth: dxScaled, bevelEnabled: false });
                                shapeGeo.rotateY(Math.PI / 2); shapeGeo.translate(0, 0, -baseWidth / 2);
                            } else if (type === 'cs_equilateral') {
                                const eqShape = new THREE.Shape();
                                eqShape.moveTo(-baseWidth / 2, 0); eqShape.lineTo(baseWidth / 2, 0);
                                eqShape.lineTo(0, baseWidth * (Math.sqrt(3) / 2) * animFactor); eqShape.lineTo(-baseWidth / 2, 0);
                                shapeGeo = new THREE.ExtrudeGeometry(eqShape, { depth: dxScaled, bevelEnabled: false });
                                shapeGeo.rotateY(Math.PI / 2);
                            }
                            if (shapeGeo) {
                                const m = new THREE.Mesh(shapeGeo, mathSolidMaterial);
                                m.position.x = midXScaled; diskGroup.add(m);
                            }
                        }
                    }
                }
            }
            // ==========================================
            // CASE B: INTERPOLATED FRUIT PROFILES
            // ==========================================
            else {
                const count = runtimePoints.length;
                if (count === 0) return;

                const sortedRuntimePoints = [...runtimePoints].sort((a, b) => a.x - b.x);

                for(let i=0; i<count; i++) {
                    if(visualMarkers[i]) visualMarkers[i].position.set(runtimePoints[i].x, runtimePoints[i].r, 0);
                }

                const minX = sortedRuntimePoints[0].x; 
                const maxX = sortedRuntimePoints[sortedRuntimePoints.length - 1].x;
                const totalWidth = maxX - minX;

                if (totalWidth > 0.001) {
                    const a = minX * scaleFactor;
                    const b = maxX * scaleFactor;
                    const totalWidthScaled = b - a;

                    const denseSamples = 300; 
                    const denseDx = totalWidthScaled / denseSamples;
                    let simpsonSum = 0;

                    for (let i = 0; i <= denseSamples; i++) {
                        const evalX = a + i * denseDx;
                        const radiusAtX = evaluateSplineRadius(evalX / scaleFactor);
                        const fx = Math.PI * Math.pow(radiusAtX, 2);
                        let weight = (i === 0 || i === denseSamples) ? 1 : (i % 2 === 0 ? 2 : 4);
                        simpsonSum += weight * fx;
                    }
                    theoreticalExact = (denseDx / 3) * simpsonSum;

                    const dxSlider = totalWidthScaled / n;
                    for (let i = 0; i < n; i++) {
                        const xMid = a + (i + 0.5) * dxSlider;
                        const radiusMid = evaluateSplineRadius(xMid / scaleFactor);
                        theoreticalApprox += Math.PI * Math.pow(radiusMid, 2) * dxSlider;
                    }

                    if (renderMode === 'disks') {
                        const baseSegmentsCount = sortedRuntimePoints.length - 1;
                        
                        for (let i = 0; i < baseSegmentsCount; i++) {
                            const pLeft = sortedRuntimePoints[i];
                            const pRight = sortedRuntimePoints[i+1];
                            const segmentW = pRight.x - pLeft.x;
                            if (segmentW <= 0.001) continue;

                            const rawShares = (segmentW / totalWidth) * n;
                            let subSteps = Math.round(rawShares);
                            if (subSteps < 1) subSteps = 1; 

                            const subDx = segmentW / subSteps;

                            for (let j = 0; j < subSteps; j++) {
                                const localXMid = pLeft.x + (j + 0.5) * subDx;
                                const lookupRadius = evaluateSplineRadius(localXMid) / scaleFactor;

                                if (lookupRadius > 0.005) {
                                    const cylGeo = new THREE.CylinderGeometry(lookupRadius, lookupRadius, subDx, 64, 1, false, 0, phiLength);
                                    cylGeo.rotateZ(Math.PI / 2);
                                    const cylMesh = new THREE.Mesh(cylGeo, [fruitMaterial, interiorMaterial, interiorMaterial]);
                                    cylMesh.position.x = localXMid; 
                                    diskGroup.add(cylMesh);
                                }
                            }
                        }
                    }

                    latexString = `V = \\pi \\int_{${a.toFixed(1)}}^{${b.toFixed(1)}} [f_{spline}(x)]^2 \\, dx`;
                }

                if (renderMode === 'smooth') {
                    fruitMesh.visible = true;
                    const profilePoints = [];
                    const samples = 100;
                    for (let i = 0; i <= samples; i++) {
                        const currX = minX + (i / samples) * totalWidth;
                        const currR = evaluateSplineRadius(currX) / scaleFactor;
                        profilePoints.push(new THREE.Vector2(currR, currX));
                    }
                    const geo = new THREE.LatheGeometry(profilePoints, Math.max(4, n), 0, Math.max(0.001, phiLength));
                    geo.rotateZ(-Math.PI / 2); fruitMesh.geometry = geo;
                } else {
                    fruitMesh.visible = false;
                }
                
                if (currentKey === 'apple') {
                    const leftmostX = sortedRuntimePoints[0].x;
                    stemGroup.position.set(leftmostX, 0, 0);
                    stemGroup.rotation.set(0, 0, Math.PI / 2);
                } else {
                    const rightmostX = sortedRuntimePoints[sortedRuntimePoints.length - 1].x;
                    stemGroup.position.set(rightmostX, 0, 0);
                    stemGroup.rotation.set(0, 0, -Math.PI / 2);
                }
            }

            // ==========================================
            // OUTPUT DATA TO UI WINDOWS
            // ==========================================
            const currentAnimFactor = hasAnimated ? animFactor : 1.0;
            document.getElementById('exact-volume').innerText = `${Math.abs(theoreticalExact * currentAnimFactor).toFixed(3)} ${unitLabel}`;
            document.getElementById('approx-volume').innerText = `${Math.abs(theoreticalApprox * currentAnimFactor).toFixed(3)} ${unitLabel}`;

            const latexContainer = document.getElementById('latex-formula');
            latexContainer.innerHTML = `\\(${latexString.replace(/\$\$/g, '')}\\)`;
            if (window.MathJax) MathJax.typesetPromise([latexContainer]);
        }

        UX = {
            updateVisualization: function() {
                const opacityVal = parseFloat(document.getElementById('opacity-slider').value);
                const showGrid = document.getElementById('grid-toggle').checked;
                fruitMaterial.opacity = opacityVal;
                mathSolidMaterial.opacity = opacityVal;
                measurementGrid.visible = showGrid;
                axisLine.visible = showGrid;
                updateGeometry(hasAnimated ? animationProgress * Math.PI * 2 : Math.PI * 2);
            }
        };
        function updateVisualization() { UX.updateVisualization(); }

        function handleActionButtonClick() {
            if (isAnimatingVolume) {
                isAnimatingVolume = false; setPlayUI();
            } else {
                if (animationProgress >= 1.0 || animationProgress <= 0.0) animationProgress = 0.001;
                isAnimatingVolume = true; hasAnimated = true; setPauseUI();
            }
        }

        function setPlayUI() {
            const playBtn = document.getElementById('play-button');
            playBtn.classList.remove('playing-state');
            document.getElementById('button-text').innerText = "Play Animation";
            document.getElementById('button-icon').innerHTML = '<path fill="currentColor" d="M8 5v14l11-7z"/>';
        }

        function setPauseUI() {
            const playBtn = document.getElementById('play-button');
            playBtn.classList.add('playing-state');
            document.getElementById('button-text').innerText = "Pause Animation";
            document.getElementById('button-icon').innerHTML = '<path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            scene.background.setHex(isLight ? 0xffffff : 0x121212);
            scene.remove(measurementGrid);
            measurementGrid = new THREE.GridHelper(8, 32, isLight ? 0x111111 : 0x444444, isLight ? 0xcccccc : 0x222222);
            measurementGrid.position.y = -1.2; measurementGrid.visible = document.getElementById('grid-toggle').checked;
            scene.add(measurementGrid);
            axisLine.material.color.setHex(isLight ? 0x111111 : 0x5a67d8);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadTargetPreset();

        function animate() {
            requestAnimationFrame(animate);
            if (isAnimatingVolume) {
                const speed = parseFloat(document.getElementById('speed-slider').value);
                animationProgress += speed;
                if (animationProgress >= 1.0) { 
                    animationProgress = 1.0; isAnimatingVolume = false; setPlayUI();
                }
                updateGeometry(animationProgress * Math.PI * 2);
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
